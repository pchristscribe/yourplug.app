name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Run audit
        working-directory: ${{ matrix.workspace }}
        run: pnpm audit --audit-level=high --prod

  test:
    name: Unit tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: pnpm test -- --coverage

  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yourplug
          POSTGRES_PASSWORD: test
          POSTGRES_DB: yourplug_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile
      - name: Apply Supabase migrations
        uses: ./.github/actions/apply-test-migrations
        with:
          db-user: yourplug
          db-password: test
          db-name: yourplug_test
      - name: Run tests
        working-directory: backend
        run: pnpm test -- --coverage
        env:
          TEST_DATABASE_URL: postgresql://yourplug:test@localhost:5432/yourplug_test
          TEST_REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ${{ secrets.TEST_SESSION_SECRET || 'test-session-secret-at-least-32-chars-long' }}
          NODE_ENV: test

  e2e:
    name: E2E tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: [build]
    # Only run when explicitly enabled (set vars.E2E_ENABLED = 'true' in repo/env settings)
    if: ${{ vars.E2E_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: ${{ matrix.workspace }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ${{ matrix.workspace }}
        run: pnpm exec playwright test
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/playwright-report/
          retention-days: 14

  build:
    name: Build verification (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: [test, backend-test]
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: pnpm run build
