name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run npm audit
        working-directory: ${{ matrix.workspace }}
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test -- --coverage

  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swordfighters
          POSTGRES_PASSWORD: test
          POSTGRES_DB: swordfighters_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Apply Supabase migrations
        run: |
          for f in supabase/migrations/*.sql; do
            psql postgresql://swordfighters:test@localhost:5432/swordfighters_test -f "$f" || true
          done
        env:
          PGPASSWORD: test
      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage
        env:
          TEST_DATABASE_URL: postgresql://swordfighters:test@localhost:5432/swordfighters_test
          TEST_REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-session-secret-at-least-32-chars-long
          NODE_ENV: test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    # Only run when explicitly enabled (set vars.E2E_ENABLED = 'true' in repo/env settings)
    if: ${{ vars.E2E_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ${{ matrix.workspace }}
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ${{ matrix.workspace }}
        run: npx playwright test
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/playwright-report/
          retention-days: 14

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: npm run build
