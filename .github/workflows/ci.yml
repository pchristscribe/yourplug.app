name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: frontend
            package_manager: npm
            lock_file: package-lock.json
            install_cmd: npm ci
            audit_cmd: npm audit --omit=dev --audit-level=high
          - workspace: admin-frontend
            package_manager: pnpm
            lock_file: pnpm-lock.yaml
            install_cmd: pnpm install --frozen-lockfile
            audit_cmd: pnpm audit --audit-level=high --prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: matrix.package_manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: ${{ matrix.package_manager }}
          cache-dependency-path: ${{ matrix.workspace }}/${{ matrix.lock_file }}
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.install_cmd }}
      - name: Run audit
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.audit_cmd }}

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: frontend
            package_manager: npm
            lock_file: package-lock.json
            install_cmd: npm ci
            test_cmd: npm test -- --coverage
          - workspace: admin-frontend
            package_manager: pnpm
            lock_file: pnpm-lock.yaml
            install_cmd: pnpm install --frozen-lockfile
            test_cmd: pnpm test -- --coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: matrix.package_manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: ${{ matrix.package_manager }}
          cache-dependency-path: ${{ matrix.workspace }}/${{ matrix.lock_file }}
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.install_cmd }}
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.test_cmd }}

  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swordfighters
          POSTGRES_PASSWORD: test
          POSTGRES_DB: swordfighters_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Apply Supabase migrations
        run: |
          psql postgresql://swordfighters:test@localhost:5432/swordfighters_test \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT 'service_role'::text \$\$;"
          find supabase/migrations -name '*.sql' | sort | \
            xargs cat | \
            psql postgresql://swordfighters:test@localhost:5432/swordfighters_test -1
        env:
          PGPASSWORD: test
      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage
        env:
          TEST_DATABASE_URL: postgresql://swordfighters:test@localhost:5432/swordfighters_test
          TEST_REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ${{ secrets.TEST_SESSION_SECRET || 'test-session-secret-at-least-32-chars-long' }}
          NODE_ENV: test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    # Only run when explicitly enabled (set vars.E2E_ENABLED = 'true' in repo/env settings)
    if: ${{ vars.E2E_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: frontend
            package_manager: npm
            lock_file: package-lock.json
            install_cmd: npm ci
          - workspace: admin-frontend
            package_manager: pnpm
            lock_file: pnpm-lock.yaml
            install_cmd: pnpm install --frozen-lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: matrix.package_manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: ${{ matrix.package_manager }}
          cache-dependency-path: ${{ matrix.workspace }}/${{ matrix.lock_file }}
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.install_cmd }}
      - name: Install Playwright browsers
        working-directory: ${{ matrix.workspace }}
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ${{ matrix.workspace }}
        run: npx playwright test
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/playwright-report/
          retention-days: 14

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [test, backend-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: frontend
            package_manager: npm
            lock_file: package-lock.json
            install_cmd: npm ci
          - workspace: admin-frontend
            package_manager: pnpm
            lock_file: pnpm-lock.yaml
            install_cmd: pnpm install --frozen-lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: matrix.package_manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: ${{ matrix.package_manager }}
          cache-dependency-path: ${{ matrix.workspace }}/${{ matrix.lock_file }}
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: ${{ matrix.install_cmd }}
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: npm run build
