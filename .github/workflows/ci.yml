name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Pushes to claude/** only run the unit-test jobs (test, backend-test) — the
# same scope the old, now-merged test.yml gave those branches. Audit, e2e,
# and build only run on push-to-main or PRs targeting main, matching what
# ci.yml ran on its own before this merge.

jobs:
  security-audit:
    name: Security audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend, marketplace, mcp-dhgate]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Run audit
        working-directory: ${{ matrix.workspace }}
        run: pnpm audit --audit-level=high --prod

  test:
    name: Unit tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend, marketplace, mcp-dhgate]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: pnpm test -- --coverage

  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yourplug
          POSTGRES_PASSWORD: test
          POSTGRES_DB: yourplug_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile
      - name: Apply Supabase migrations
        run: |
          set -euo pipefail
          # Stub out Supabase-specific auth/storage schemas so migrations that
          # reference auth.role() (RLS policies) or storage.buckets
          # (013_consignment_storage_bucket.sql) succeed against plain
          # Postgres in CI.
          psql postgresql://yourplug:test@localhost:5432/yourplug_test \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT 'service_role'::text \$\$;" \
            -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS \$\$ SELECT '00000000-0000-0000-0000-000000000000'::uuid \$\$;" \
            -c "CREATE OR REPLACE FUNCTION auth.email() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT ''::text \$\$;" \
            -c "CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);" \
            -c "CREATE SCHEMA IF NOT EXISTS storage;" \
            -c "CREATE TABLE IF NOT EXISTS storage.buckets (id text PRIMARY KEY, name text NOT NULL, public boolean NOT NULL DEFAULT false);"
          find supabase/migrations -name '*.sql' -print0 | sort -zV | \
            xargs -0 cat | \
            psql postgresql://yourplug:test@localhost:5432/yourplug_test -1
        env:
          PGPASSWORD: test
      - name: Run tests
        working-directory: backend
        run: pnpm test -- --coverage
        env:
          TEST_DATABASE_URL: postgresql://yourplug:test@localhost:5432/yourplug_test
          TEST_REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ${{ secrets.TEST_SESSION_SECRET || 'test-session-secret-at-least-32-chars-long' }}
          NODE_ENV: test

  e2e:
    name: E2E tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: [build]
    # Only run when explicitly enabled (set vars.E2E_ENABLED = 'true' in repo/env settings)
    if: ${{ (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.E2E_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: ${{ matrix.workspace }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ${{ matrix.workspace }}
        run: pnpm exec playwright test
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/playwright-report/
          retention-days: 14

  build:
    name: Build verification (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: [test, backend-test]
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend, marketplace, mcp-dhgate]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: pnpm run build
