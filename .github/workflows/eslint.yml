# ESLint static analysis with SARIF upload
# frontend uses the project's ESLint v9 flat config (eslint.config.ts)

name: ESLint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '27 15 * * 1'

jobs:
  eslint:
    name: Run eslint scanning (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, admin-frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: ${{ matrix.workspace }}
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          pnpm exec eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ matrix.workspace }}/eslint-results.sarif
          category: eslint-${{ matrix.workspace }}
          wait-for-processing: true
