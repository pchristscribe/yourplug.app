name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ── User frontend ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ── Admin frontend ─────────────────────────────────────────────────────
  test-admin:
    name: Admin frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: admin-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ── Backend ────────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: swordfighters
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: swordfighters_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://swordfighters:test_password@localhost:5432/swordfighters_test
      TEST_DATABASE_URL: postgresql://swordfighters:test_password@localhost:5432/swordfighters_test
      REDIS_URL: redis://localhost:6379
      TEST_REDIS_URL: redis://localhost:6379
      SESSION_SECRET: test-session-secret-at-least-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        env:
          PGPASSWORD: test_password
        run: |
          set -euo pipefail
          # Stub out Supabase-specific auth schema so migrations that reference
          # auth.role() (e.g. RLS policies in 005_perf_improvements.sql) succeed
          # against plain Postgres in CI.
          psql -h localhost -U swordfighters -d swordfighters_test \
            -c "CREATE SCHEMA IF NOT EXISTS auth;" \
            -c "CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT 'service_role'::text \$\$;"
          find ../supabase/migrations -name '*.sql' | sort | \
            xargs cat | \
            psql -h localhost -U swordfighters -d swordfighters_test -1

      - name: Run tests
        run: pnpm test
