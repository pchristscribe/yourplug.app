name: Apply test migrations
description: >-
  Stubs the Supabase auth schema (role()/uid()/email()/users table) so
  migrations that reference it succeed against plain Postgres, then applies
  every SQL file under supabase/migrations in order.
inputs:
  db-host:
    description: Postgres host
    default: localhost
  db-port:
    description: Postgres port
    default: '5432'
  db-user:
    description: Postgres user
    required: true
  db-password:
    description: Postgres password
    required: true
  db-name:
    description: Postgres database name
    required: true
runs:
  using: composite
  steps:
    - name: Apply Supabase migrations
      shell: bash
      env:
        PGPASSWORD: ${{ inputs.db-password }}
      run: |
        set -euo pipefail
        PSQL="psql -h ${{ inputs.db-host }} -p ${{ inputs.db-port }} -U ${{ inputs.db-user }} -d ${{ inputs.db-name }}"
        $PSQL \
          -c "CREATE SCHEMA IF NOT EXISTS auth;" \
          -c "CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT 'service_role'::text \$\$;" \
          -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS \$\$ SELECT '00000000-0000-0000-0000-000000000000'::uuid \$\$;" \
          -c "CREATE OR REPLACE FUNCTION auth.email() RETURNS text LANGUAGE sql STABLE AS \$\$ SELECT ''::text \$\$;" \
          -c "CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);"
        find supabase/migrations -name '*.sql' -print0 | sort -zV | \
          xargs -0 cat | \
          $PSQL -1
